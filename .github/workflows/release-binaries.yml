name: Release Binaries

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target.suffix }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - triple: x86_64-apple-darwin
            suffix: darwin-amd64
            os: macos-latest
          - triple: aarch64-apple-darwin
            suffix: darwin-arm64
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target.triple }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target.triple }} --bin cosmic-grackle -p cosmic-grackle

      - name: Stage and package artifact
        id: package
        run: |
          set -euo pipefail
          BIN_SRC="target/${{ matrix.target.triple }}/release/cosmic-grackle"
          STAGE="$(mktemp -d)"
          cp "$BIN_SRC" "$STAGE/cosmic-grackle"
          chmod +x "$STAGE/cosmic-grackle"

          ARCHIVE="cosmic-grackle-${{ matrix.target.suffix }}.tar.gz"
          tar -C "$STAGE" -czf "$ARCHIVE" cosmic-grackle
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "checksum=$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-grackle-${{ matrix.target.suffix }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  mcpb:
    name: Package MCPB bundle
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download per-arch artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage and pack MCPB
        id: package
        run: |
          set -euo pipefail

          mkdir -p thin
          tar -xzf dist/cosmic-grackle-darwin-amd64.tar.gz -C thin
          mv thin/cosmic-grackle thin/cosmic-grackle-amd64
          tar -xzf dist/cosmic-grackle-darwin-arm64.tar.gz -C thin
          mv thin/cosmic-grackle thin/cosmic-grackle-arm64

          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/bin"

          lipo -create \
            -output "$STAGE/bin/cosmic-grackle" \
            thin/cosmic-grackle-amd64 \
            thin/cosmic-grackle-arm64
          chmod +x "$STAGE/bin/cosmic-grackle"

          VERSION="${GITHUB_REF_NAME}"
          jq --arg v "$VERSION" '.version = $v' \
            mcpb/manifest.json \
            > "$STAGE/manifest.json"

          ARCHIVE="cosmic-grackle.mcpb"
          npx -y @anthropic-ai/mcpb pack "$STAGE" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "checksum=$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosmic-grackle-mcpb
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build, mcpb]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cosmic-grackle-*.tar.gz
            dist/cosmic-grackle-*.tar.gz.sha256
            dist/cosmic-grackle.mcpb
            dist/cosmic-grackle.mcpb.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
